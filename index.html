<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加减行工具箱 - 多功能实用工具聚合平台</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <!-- 顶部栏 -->
        <header class="top-bar">
            <div class="top-bar-left">
                <span class="logo-icon">🛠️</span>
                <span class="logo-text">加减行工具箱</span>
                <span class="version-badge">v2.0</span>
            </div>
            <div class="top-bar-center">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="globalSearch" placeholder="搜索工具... (Ctrl+K)">
                    <span class="search-hint">Ctrl+K</span>
                </div>
            </div>
            <div class="top-bar-right">
                <button class="favorites-btn" id="favoritesBtn" title="我的收藏">
                    <span class="favorites-icon">⭐</span>
                    <span class="favorites-count" id="favoritesCount">0</span>
                </button>
                <button class="favorites-btn" id="trainingBtn" title="实训记录">
                    <span class="favorites-icon">📝</span>
                    <span class="favorites-count" id="trainingCount">0</span>
                </button>
                <button class="theme-btn" id="themeBtn" title="切换主题">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </header>

        <div class="main-wrapper">
            <!-- 左侧导航栏 -->
            <aside class="left-sidebar" id="leftSidebar">
                <nav class="category-nav" id="categoryNav">
                    <div class="category-item active" data-category="ai">
                        <span class="category-icon">🤖</span>
                        <span class="category-name">AI助手</span>
                        <span class="category-badge hot">HOT</span>
                    </div>
                    <div class="category-item" data-category="password">
                        <span class="category-icon">🔐</span>
                        <span class="category-name">密码安全</span>
                    </div>
                    <div class="category-item" data-category="encode">
                        <span class="category-icon">🔢</span>
                        <span class="category-name">编码解码</span>
                    </div>
                    <div class="category-item" data-category="text">
                        <span class="category-icon">📝</span>
                        <span class="category-name">文本处理</span>
                    </div>
                    <div class="category-item" data-category="dev">
                        <span class="category-icon">💻</span>
                        <span class="category-name">开发工具</span>
                    </div>
                    <div class="category-item" data-category="network">
                        <span class="category-icon">🌐</span>
                        <span class="category-name">网络工具</span>
                    </div>
                    <div class="category-item" data-category="image">
                        <span class="category-icon">🖼️</span>
                        <span class="category-name">图片工具</span>
                    </div>
                    <div class="category-item" data-category="calc">
                        <span class="category-icon">🧮</span>
                        <span class="category-name">计算工具</span>
                    </div>
                    <div class="category-item" data-category="time">
                        <span class="category-icon">⏰</span>
                        <span class="category-name">时间日期</span>
                    </div>
                    <div class="category-item" data-category="life">
                        <span class="category-icon">🏠</span>
                        <span class="category-name">生活金融</span>
                    </div>
                    <div class="category-item" data-category="learn">
                        <span class="category-icon">🎓</span>
                        <span class="category-name">网安实训</span>
                    </div>
                    <div class="category-item" data-category="knowledge">
                        <span class="category-icon">📚</span>
                        <span class="category-name">知识库</span>
                    </div>
                </nav>
            </aside>

            <!-- 主内容区 -->
            <main class="content-area">
                <div class="content-header">
                    <h2 class="content-title" id="contentTitle">AI助手</h2>
                    <span class="tool-count" id="toolCount">0 个工具</span>
                </div>
                
                <div class="tools-grid" id="toolsGrid">
                </div>
            </main>
        </div>
    </div>

    <!-- 底部抽屉 -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="bottom-drawer" id="bottomDrawer">
        <div class="drawer-header">
            <h3 class="drawer-title" id="drawerTitle">工具说明</h3>
            <button class="drawer-close" id="drawerClose">✕</button>
        </div>
        <div class="drawer-content" id="drawerContent">
        </div>
    </div>

    <!-- 工具弹窗 -->
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="tool-modal" id="toolModal">
        <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">工具</h3>
            <button class="modal-close" id="modalClose">✕</button>
        </div>
        <div class="modal-body" id="modalBody">
        </div>
    </div>

    <!-- 实训记录弹窗 -->
    <div class="modal-overlay" id="trainingOverlay"></div>
    <div class="tool-modal" id="trainingModal">
        <div class="modal-header">
            <h3 class="modal-title">📝 实训记录</h3>
            <button class="modal-close" id="trainingClose">✕</button>
        </div>
        <div class="modal-body" id="trainingBody">
        </div>
    </div>

    <!-- AI助手弹窗 -->
    <div class="ai-overlay" id="aiOverlay"></div>
    <div class="ai-modal" id="aiModal">
        <div class="ai-header">
            <div class="ai-header-left">
                <div class="ai-title">新对话</div>
                <div class="ai-subtitle">内容由豆包AI生成</div>
            </div>
            <div class="ai-header-right">
                <button class="ai-close-btn" id="aiCloseBtn" title="关闭">✕</button>
            </div>
        </div>
        <div class="ai-messages" id="aiMessages">
            <div class="ai-welcome">
                <div class="ai-welcome-text">有什么我能帮你的吗？</div>
            </div>
        </div>
        <div class="ai-input-area">
            <div class="ai-quick-buttons">
                <button class="ai-quick-btn" data-prompt="快速回答：">⚡ 快速</button>
                <button class="ai-quick-btn" data-prompt="帮我写代码：">&lt;/&gt; 编程</button>
                <button class="ai-quick-btn" data-prompt="帮我写作：">📝 帮我写作</button>
                <button class="ai-quick-btn" data-prompt="解答疑问：">💡 解答答疑</button>
                <button class="ai-quick-btn" data-prompt="生成图片描述：">🖼️ 图像生成</button>
                <button class="ai-quick-btn" data-prompt="创作音乐：">🎵 音乐生成</button>
            </div>
            <div class="ai-input-wrapper">
                <textarea class="ai-input" id="aiInput" placeholder="发消息或输入/选择技能"></textarea>
                <button class="ai-send-btn" id="aiSendBtn">
                    <span class="ai-send-icon">🎤</span>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
